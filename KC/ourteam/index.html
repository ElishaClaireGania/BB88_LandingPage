<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Team</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="app.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-[#f0f4f3] min-h-screen">
    <section
      class="team-section relative w-full min-h-screen py-16 flex flex-col items-center justify-between overflow-hidden"
      id="team"
    >
      <div
        class="absolute inset-0 bg-cover bg-no-repeat bg-center z-0 pointer-events-none"
        style="background-image: url(&quot;assets/bg/background4.png&quot;)"
      ></div>

      <div
        class="absolute top-0 left-0 right-0 w-full pointer-events-none z-10"
      >
        <img
          src="assets/vector/vector3.png"
          alt="Cloud Border"
          class="w-full h-auto object-cover max-h-[120px]"
        />
      </div>

      <div
        class="relative z-20 max-w-6xl mx-auto px-6 pt-12 w-full flex-grow flex flex-col items-center justify-center"
      >
        <div class="text-center mb-12">
          <h2
            class="text-3xl md:text-4xl font-extrabold text-brandTeal tracking-wide inline-block relative font-sans"
          >
            Our Team
            <span
              class="block h-1.5 w-1/2 bg-brandLime mx-auto mt-2 rounded-full"
            ></span>
          </h2>
        </div>

        <div
          class="w-full flex flex-col gap-6 items-center max-w-5xl font-sans"
        >
          <div
            class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full justify-center"
          >
            <button
              class="team-card bg-white rounded-2xl border-4 border-brandTeal overflow-hidden cursor-pointer hover:shadow-lg w-full h-44"
              data-role="software"
              id="btn-software"
            >
              <div
                class="flex-grow flex items-center justify-center p-4 bg-white w-full"
              >
                <img
                  src="assets/icon/ourteam(icon1).png"
                  alt="Software Engineers Icon"
                  class="w-20 h-20 object-contain"
                />
              </div>
              <div
                class="card-band bg-brandTeal text-white text-center py-2 px-1 text-sm font-bold w-full transition-all"
              >
                Software Engineers
              </div>
            </button>

            <button
              class="team-card bg-white rounded-2xl border-4 border-brandTeal overflow-hidden cursor-pointer hover:shadow-lg w-full h-44"
              data-role="web"
              id="btn-web"
            >
              <div
                class="flex-grow flex items-center justify-center p-4 bg-white w-full"
              >
                <img
                  src="assets/icon/ourteam(icon2).png"
                  alt="Web Developers Icon"
                  class="w-20 h-20 object-contain"
                />
              </div>
              <div
                class="card-band bg-brandTeal text-white text-center py-2 px-1 text-sm font-bold w-full transition-all"
              >
                Web Developers
              </div>
            </button>

            <button
              class="team-card bg-white rounded-2xl border-4 border-brandTeal overflow-hidden cursor-pointer hover:shadow-lg w-full h-44"
              data-role="app"
              id="btn-app"
            >
              <div
                class="flex-grow flex items-center justify-center p-4 bg-white w-full"
              >
                <img
                  src="/assets/icon/ourteam(icon3).png"
                  alt="App Developers Icon"
                  class="w-20 h-20 object-contain"
                />
              </div>
              <div
                class="card-band bg-brandTeal text-white text-center py-2 px-1 text-sm font-bold w-full transition-all"
              >
                App Developers
              </div>
            </button>

            <button
              class="team-card bg-white rounded-2xl border-4 border-brandTeal overflow-hidden cursor-pointer hover:shadow-lg w-full h-44"
              data-role="graphic"
              id="btn-graphic"
            >
              <div
                class="flex-grow flex items-center justify-center p-4 bg-white w-full"
              >
                <img
                  src="/assets/icon/ourteam(icon4).png"
                  alt="Graphic Artists Icon"
                  class="w-20 h-20 object-contain"
                />
              </div>
              <div
                class="card-band bg-brandTeal text-white text-center py-2 px-1 text-sm font-bold w-full transition-all"
              >
                Graphic Artists
              </div>
            </button>
          </div>

          <div
            class="grid grid-cols-2 md:flex md:justify-center gap-6 w-full md:w-auto"
          >
            <button
              class="team-card bg-white rounded-2xl border-4 border-brandTeal overflow-hidden cursor-pointer hover:shadow-lg w-full md:w-48 h-44 active-card"
              data-role="multimedia"
              id="btn-multimedia"
            >
              <div
                class="flex-grow flex items-center justify-center p-4 bg-white w-full"
              >
                <div
                  class="w-24 h-24 rounded-full bg-[#3ba28a] flex items-center justify-center shadow-inner transition-all duration-300 active-circle overflow-hidden"
                >
                  <span class="text-white text-4xl">📷</span>
                </div>
              </div>
              <div
                class="card-band bg-transparent text-brandTeal text-center py-2 px-1 text-sm font-bold w-full transition-all"
              >
                Multimedia Artists
              </div>
            </button>

            <button
              class="team-card bg-white rounded-2xl border-4 border-brandTeal overflow-hidden cursor-pointer hover:shadow-lg w-full md:w-48 h-44"
              data-role="writers"
              id="btn-writers"
            >
              <div
                class="flex-grow flex items-center justify-center p-4 bg-white w-full"
              >
                <img
                  src="/assets/icon/ourteam(icon5).png"
                  alt="Creative Writers Icon"
                  class="w-20 h-20 object-contain"
                />
              </div>
              <div
                class="card-band bg-brandTeal text-white text-center py-2 px-1 text-sm font-bold w-full transition-all"
              >
                Creative Writers
              </div>
            </button>

            <button
              class="team-card bg-white rounded-2xl border-4 border-brandTeal overflow-hidden cursor-pointer hover:shadow-lg w-full col-span-2 md:w-48 h-44"
              data-role="director"
              id="btn-director"
            >
              <div
                class="flex-grow flex items-center justify-center p-4 bg-white w-full"
              >
                <img
                  src="assets/icon/our team(icon 6).png"
                  alt="Creative Director Icon"
                  class="w-20 h-20 object-contain"
                />
              </div>
              <div
                class="card-band bg-brandTeal text-white text-center py-2 px-1 text-sm font-bold w-full transition-all"
              >
                Creative Director
              </div>
            </button>
          </div>
        </div>

        <div
          id="team-speech-bubble"
          class="speech-bubble relative bg-white text-gray-800 rounded-[32px] p-10 md:p-14 mt-12 max-w-5xl shadow-lg border border-gray-100 font-sans z-10 w-full transition-all duration-300"
        >
          <div
            id="bubble-arrow"
            class="absolute -top-4 w-0 h-0 border-l-[18px] border-l-transparent border-r-[18px] border-r-transparent border-b-[18px] border-b-white transform -translate-x-1/2"
            style="
              left: 50%;
              filter: drop-shadow(0 -4px 2px rgba(0, 0, 0, 0.03));
            "
          ></div>

          <h3
            id="role-title"
            class="text-2xl md:text-3xl font-extrabold text-brandTeal mb-6 tracking-wide"
          >
            Multimedia Artists
          </h3>
          <p
            id="role-desc"
            class="text-sm md:text-[17px] text-gray-600 leading-relaxed md:leading-loose text-justify tracking-wide"
          >
            Multimedia Artists are similar to Graphic Artists, but they
            specialize in creating dynamic and interactive content like videos,
            3D animations, and virtual reality experiences. They use a variety
            of software tools to create engaging and immersive experiences for
            users.
          </p>
        </div>

        <div
          class="w-full max-w-4xl mt-12 flex justify-center z-10 pointer-events-none"
        >
          <img
            src="assets/icon/our team(icon 7).png"
            alt="Team Workspace Illustration"
            class="w-full h-auto object-contain max-h-[300px]"
          />
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
